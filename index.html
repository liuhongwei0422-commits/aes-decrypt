<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AES解密</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #581c87 50%, #0f172a 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 550px;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            font-weight: 700;
        }
        .input-group {
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            color: white;
            font-size: 15px;
            font-family: monospace;
            outline: none;
            resize: vertical;
            transition: all 0.3s;
        }
        textarea:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
        }
        textarea::placeholder {
            color: #64748b;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            box-shadow: 0 10px 25px -5px rgba(168, 85, 247, 0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .result-group {
            margin-top: 20px;
        }
        .result-box {
            width: 100%;
            min-height: 120px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            color: white;
            word-break: break-all;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 15px;
            line-height: 1.6;
        }
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 14px;
            padding: 16px;
            color: #fca5a5;
            margin-top: 20px;
            text-align: center;
        }
        .copy-btn {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AES解密</h1>
        
        <div class="input-group">
            <textarea id="ciphertext" placeholder="请输入密文..."></textarea>
        </div>
        
        <button class="btn" onclick="decrypt()">解密</button>
        
        <div id="result"></div>
    </div>

    <script>
        const KEY = 'a85296841867cd38320dea6f9a51ae30';
        const IV = '1600000000000000';
        
        function decrypt() {
            const ciphertext = document.getElementById('ciphertext').value.trim();
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = '';
            
            if (!ciphertext) {
                resultDiv.innerHTML = '<div class="error">请输入密文</div>';
                return;
            }
            
            try {
                const key = CryptoJS.enc.Utf8.parse(KEY);
                const iv = CryptoJS.enc.Utf8.parse(IV);
                
                const decrypted = CryptoJS.AES.decrypt(ciphertext, key, {
                    iv: iv,
                    mode: CryptoJS.mode.CBC,
                    padding: CryptoJS.pad.Pkcs7
                });
                
                const result = decrypted.toString(CryptoJS.enc.Utf8);
                
                if (!result || result.length === 0) {
                    throw new Error('解密结果为空');
                }
                
                resultDiv.innerHTML = `
                    <div class="result-group">
                        <div class="result-box">${escapeHtml(result)}</div>
                        <button class="copy-btn" onclick="copyResult()">复制</button>
                    </div>
                `;
                window.finalResult = result;
                
            } catch (e) {
                resultDiv.innerHTML = `<div class="error">解密失败：${e.message}</div>`;
            }
        }
        
        function copyResult() {
            if (window.finalResult) {
                navigator.clipboard.writeText(window.finalResult);
                alert('已复制');
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
